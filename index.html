<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍣 寿司パズル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=M+PLUS+Rounded+1c:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #FFF8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .game-board {
            border: 3px solid #B0BEC5;
            border-radius: 8px;
            overflow: hidden;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            grid-template-rows: repeat(10, 50px);
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid rgba(0,0,0,0.06);
            background: #F0EDE8;
            overflow: hidden;
        }

        .cell svg { display: block; width: 100%; height: 100%; }

        @keyframes sushiPop {
            0%   { transform: scale(1);    opacity: 1;   filter: brightness(1); }
            25%  { transform: scale(1.2);  opacity: 1;   filter: brightness(2); }
            65%  { transform: scale(0.85); opacity: 0.5; filter: brightness(1.4); }
            100% { transform: scale(0);    opacity: 0; }
        }

        .cell.matched {
            animation: sushiPop 0.45s ease forwards;
            overflow: visible;
            z-index: 10;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 120px;
            height: 506px;
        }
        .side-panel > * {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .box {
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 8px;
            padding: 8px 15px;
            text-align: center;
        }

        .box h3 { font-size: 13px; color: #888; margin-bottom: 8px; }

        .score { font-size: 32px; font-weight: bold; color: #333; }

        .next-piece {
            width: 50px;
            height: 50px;
            margin: 0 auto;
            overflow: hidden;
        }
        .next-piece svg { display: block; width: 100%; height: 100%; }

        .btn {
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: #FF5252; }

        .controls {
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
        .controls h3 { font-size: 13px; color: #888; margin-bottom: 6px; }

        @keyframes popupAnim {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
            45%  { transform: translate(-50%, -50%) scale(1); }
            75%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        #levelup-msg, #gameover-msg {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border: 3px solid #111;
            border-radius: 16px;
            box-shadow: 5px 5px 0px #111;
            pointer-events: none;
            z-index: 100;
            text-align: center;
            overflow: hidden;
        }
        #levelup-msg.show, #gameover-msg.show {
            display: block;
            animation: popupAnim 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .popup-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            color: #fff;
            padding: 10px 20px;
            border-bottom: 3px solid #111;
        }
        .popup-body {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #111;
            padding: 16px 28px;
            line-height: 2;
        }

        /* タッチボタン（スマホのみ表示） */
        .touch-controls {
            display: none;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
        }
        .touch-btn {
            width: 72px;
            height: 72px;
            font-size: 26px;
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background 0.1s, transform 0.1s;
        }
        .touch-btn:active {
            background: #FFE4E4;
            transform: scale(0.92);
        }

        /* ── ミニゲーム ── */
        /* ── ミニゲーム ── */
        #minigame-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #minigame-overlay.mg-hidden { display: none; }

        .mg-card {
            background: #fff;
            border: 3px solid #111;
            border-radius: 16px;
            width: min(340px, 88vw);
            box-shadow: 6px 6px 0 #111;
            overflow: hidden;
            animation: glitchPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .mg-screen { display: contents; }
        .mg-screen.mg-hidden { display: none; }

        .mg-titlebar {
            padding: 12px 16px;
            border-bottom: 3px solid #111;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            letter-spacing: 0.04em;
            text-align: center;
        }
        .mg-body {
            padding: 20px 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .mg-hint {
            font-family: 'DotGothic16', monospace;
            font-size: 13px;
            color: #555;
        }

        /* 畑 */
        .mg-field-wrap { width: 100%; }
        .mg-field-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            background: #7EC850;
            padding: 12px 8px 6px;
            border: 3px solid #111;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .mg-dirt-row {
            width: 100%;
            height: 18px;
            background: #7A4A26;
            border: 3px solid #111;
            border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .potato-plant {
            cursor: pointer;
            transition: transform 0.15s;
            text-align: center;
            touch-action: manipulation;
            image-rendering: pixelated;
        }
        .potato-plant:active { transform: scale(0.85); }
        @keyframes harvestPop {
            0%   { transform: scale(1);   opacity: 1; }
            50%  { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(0);   opacity: 0; }
        }
        .potato-plant.harvested { animation: harvestPop 0.3s ease forwards; }

        .mg-dots { display: flex; gap: 8px; }
        .mg-dot {
            width: 16px; height: 16px;
            background: #DDD;
            border: 3px solid #111;
            box-shadow: 2px 2px 0 #111;
        }
        .mg-dot.filled { background: #7EC850; }

        /* かまど */
        .mg-furnace-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mg-slot {
            width: 68px; height: 68px;
            background: #E8E8E8;
            border: 3px solid #111;
            border-radius: 4px;
            box-shadow: 3px 3px 0 #111;
            display: flex; align-items: center; justify-content: center;
            image-rendering: pixelated;
        }
        .mg-arrow {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #111;
        }
        @keyframes furnaceGlow {
            0%,100% { opacity: 1; }
            50%     { opacity: 0.7; }
        }
        #furnace-svg-active { animation: furnaceGlow 0.4s ease-in-out infinite; display: none; }
        #furnace-svg-idle   { display: block; }

        /* ボタン */
        .mg-btn {
            background: #FF6B9D;
            color: #fff;
            border: 3px solid #111;
            border-radius: 10px;
            box-shadow: 4px 4px 0 #111;
            padding: 12px 0;
            font-family: 'DotGothic16', monospace;
            font-size: 16px;
            cursor: pointer;
            touch-action: manipulation;
            width: 100%;
            transition: transform 0.08s, box-shadow 0.08s;
        }
        .mg-btn:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 #111; }
        .mg-btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 #111; }
        .mg-btn:disabled { background: #ccc; box-shadow: 4px 4px 0 #999; color: #888; }

        .mg-bonus {
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            color: #FFB300;
            text-shadow: 2px 2px 0 #111;
        }

        /* ── ポンノベルゲーム ── */
        #pon-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #pon-overlay.pon-hidden { display: none; }

        #pon-screen {
            position: relative;
            width: min(480px, 100vw);
            height: min(480px, 100vw);
            background: #000;
            overflow: hidden;
            border: 6px solid #FFF;
            box-shadow: 0 0 0 3px #000, 0 0 0 6px #888;
            image-rendering: pixelated;
            cursor: pointer;
        }

        /* スキャンライン */
        #pon-scanlines {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.18) 3px,
                rgba(0,0,0,0.18) 4px
            );
        }

        #pon-bg {
            position: absolute;
            inset: 0;
        }

        #pon-sprite-area {
            position: absolute;
            top: 0; left: 0; right: 0;
            bottom: 155px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        @keyframes ponWalk {
            0%   { transform: translateY(0px); }
            25%  { transform: translateY(-12px); }
            50%  { transform: translateY(0px); }
            75%  { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        #pon-sprite {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            mix-blend-mode: lighten;
            animation: ponWalk 0.6s steps(2, end) infinite;
        }

        #pon-textbox {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 155px;
            background: #000;
            border-top: 4px solid #FFF;
            box-shadow: inset 0 4px 0 #000, inset 0 8px 0 #FFF;
            padding: 18px 16px 10px;
        }

        #pon-name-tag {
            display: inline-block;
            background: #000;
            border: 3px solid #FFF;
            color: #FFF;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            padding: 3px 8px;
            margin-bottom: 8px;
            image-rendering: pixelated;
        }

        #pon-msg-area {
            color: #FFF;
            font-family: 'DotGothic16', monospace;
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 0.04em;
            white-space: pre-wrap;
        }

        #pon-cursor {
            display: inline-block;
            color: #FFF;
            font-size: 8px;
            animation: ponBlink 0.6s step-end infinite;
            margin-left: 4px;
        }
        #pon-cursor.hidden { visibility: hidden; }
        @keyframes ponBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes ponFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        #pon-overlay:not(.pon-hidden) { animation: ponFadeIn 0.8s ease; }

        /* ── ゲームグリッチ演出 ── */
        @keyframes screenGlitch {
            0%,100% { filter: none; transform: none; }
            4%   { filter: hue-rotate(90deg) saturate(5); transform: skewX(4deg) translateX(8px); }
            5%   { filter: none; transform: none; }
            18%  { filter: hue-rotate(200deg) brightness(1.6) saturate(3); transform: skewX(-3deg) translateX(-6px); }
            19%  { filter: none; transform: none; }
            33%  { filter: hue-rotate(30deg) saturate(6) brightness(0.7); transform: skewX(5deg) translateX(5px); }
            34%  { filter: none; transform: none; }
            50%  { filter: hue-rotate(270deg) brightness(2.2); transform: skewX(-4deg) translateX(-8px); }
            51%  { filter: none; transform: none; }
            67%  { filter: hue-rotate(120deg) saturate(4); transform: skewX(3deg) translateX(4px); }
            68%  { filter: none; transform: none; }
            82%  { filter: hue-rotate(180deg) brightness(1.4) saturate(0.4); transform: skewX(-2deg) translateX(-3px); }
            83%  { filter: none; transform: none; }
        }
        .glitch-active {
            animation: screenGlitch 8s linear forwards;
        }

        /* ── グリッチシーケンス ── */
        #glitch-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #glitch-overlay.glitch-hidden { display: none; }

        /* エラーダイアログ */
        #glitch-dialog {
            background: #fff;
            border-radius: 16px;
            width: min(340px, 88vw);
            border: 3px solid #111;
            box-shadow: 6px 6px 0px #111;
            overflow: hidden;
            animation: glitchPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes glitchPop {
            from { transform: scale(0.6); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        #glitch-titlebar {
            background: #FF6B9D;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #111;
        }
        #glitch-titlebar span {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #fff;
            letter-spacing: 0.04em;
        }
        #glitch-close {
            background: #fff;
            border: 2px solid #111;
            border-radius: 50%;
            width: 26px; height: 26px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            font-weight: 900;
            line-height: 1;
            box-shadow: 2px 2px 0 #111;
        }
        #glitch-body {
            padding: 24px 20px 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        #glitch-icon {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #FFE066;
            border: 3px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 22px;
            color: #111;
            flex-shrink: 0;
            box-shadow: 3px 3px 0 #111;
        }
        #glitch-msg {
            font-family: 'DotGothic16', monospace;
            font-size: 14px;
            color: #111;
            line-height: 1.8;
        }
        #glitch-msg .err-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #FF4757;
            display: block;
            margin-bottom: 10px;
            letter-spacing: 0.04em;
        }
        #glitch-footer {
            padding: 10px 20px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        #glitch-ok {
            background: #4ECDC4;
            color: #fff;
            border: 3px solid #111;
            border-radius: 8px;
            padding: 9px 28px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #111;
            transition: transform 0.08s, box-shadow 0.08s;
        }
        #glitch-ok:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #111;
        }

        /* ターミナル */
        #glitch-terminal {
            position: absolute;
            inset: 0;
            background: #1A1A2E;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 36px 28px;
        }
        #glitch-terminal.glitch-hidden { display: none; }
        #glitch-term-lines div {
            font-family: 'Press Start 2P', 'DotGothic16', monospace;
            font-size: 9px;
            line-height: 2.4;
            color: #00FF9F;
        }
        #glitch-term-lines .t-error { color: #FF6B9D; }
        #glitch-term-lines .t-warn  { color: #FFE066; }
        #glitch-term-lines .t-white { color: #fff; font-family: 'DotGothic16', monospace; font-size: 14px; }
        #glitch-cursor {
            display: inline-block;
            color: #00FF9F;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            animation: termBlink 0.5s step-end infinite;
        }
        @keyframes termBlink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* スタートボタン（PC：サイドパネル内） */
        #start-overlay {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #start-overlay.hidden { display: none !important; }
        .start-overlay-btn {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 900;
            font-size: 20px;
            padding: 14px 0;
            width: 100%;
            border-radius: 16px;
            background: #FF6B9D;
            color: #fff;
            border: 3px solid #111;
            cursor: pointer;
            box-shadow: 5px 5px 0px #111;
            transition: transform 0.08s, box-shadow 0.08s;
            letter-spacing: 0.06em;
        }
        .start-overlay-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0px #111;
        }
        .start-overlay-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #111;
        }

        /* スマホ：中央固定オーバーレイに戻す */
        @media (max-width: 900px) {
            #start-overlay {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 50;
                pointer-events: none;
            }
            #start-overlay.hidden { display: none; }
            .start-overlay-btn {
                pointer-events: all;
                width: auto;
                padding: 18px 48px;
            }
        }

        /* モバイルレイアウト */
        @media (max-width: 900px) {
            body { align-items: flex-start; padding: 12px 0; }
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            .side-panel { order: -1; }
            .board-grid {
                grid-template-columns: repeat(6, 44px);
                grid-template-rows: repeat(10, 44px);
            }
            .cell { width: 44px; height: 44px; }
            .next-piece { width: 44px; height: 44px; }
            .side-panel {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                min-width: unset;
                width: 100%;
                max-width: 280px;
                gap: 8px;
            }
            .box { flex: 1; min-width: 70px; padding: 8px; }
            .score { font-size: 20px; }
            .btn { padding: 10px 20px; width: auto; }
            .controls { display: none; }
            .touch-controls { display: flex; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div>
        <div class="game-board">
            <div class="board-grid" id="board"></div>
        </div>
        <div class="touch-controls">
            <button class="touch-btn" id="btn-left">◀</button>
            <button class="touch-btn" id="btn-down">▼</button>
            <button class="touch-btn" id="btn-right">▶</button>
        </div>
    </div>
    <div class="side-panel">
        <div class="box">
            <h3>レベル</h3>
            <div class="score" id="level">1</div>
        </div>
        <div class="box">
            <h3>スコア</h3>
            <div class="score" id="score">0</div>
        </div>
        <div class="box">
            <h3>次のピース</h3>
            <div class="next-piece" id="next-piece"></div>
        </div>
        <div class="controls">
            <h3>操作方法</h3>
            ← → 移動<br>
            ↓ 落とす
        </div>
        <div id="start-overlay">
            <button class="start-overlay-btn" id="start-btn">スタート</button>
        </div>
    </div>
</div>

<div id="minigame-overlay" class="mg-hidden">

    <!-- 畑画面 -->
    <div id="mg-field" class="mg-screen">
        <div class="mg-card">
            <div class="mg-titlebar" style="background:#4A9E28;color:#fff;">HARVEST !!</div>
            <div class="mg-body">
                <div class="mg-field-wrap">
                    <div class="mg-field-row">
                        <div class="potato-plant" id="plant-0" onclick="harvestPlant(0)">
                            <svg viewBox="0 0 48 72" width="60" height="84" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
                                <rect x="0"  y="12" width="20" height="4"  fill="#1D5E00"/>
                                <rect x="4"  y="8"  width="20" height="16" fill="#3DA820"/>
                                <rect x="8"  y="4"  width="12" height="12" fill="#52C430"/>
                                <rect x="28" y="12" width="20" height="4"  fill="#1D5E00"/>
                                <rect x="24" y="8"  width="20" height="16" fill="#3DA820"/>

// 共通パーツ：シャリ（酢飯）
function riceBlock(y1) {
    return `
    <rect x="2" y="${y1}" width="46" height="${48 - y1}" fill="#FFF5D6"/>
    <rect x="2" y="${y1}" width="46" height="4" fill="#FFFFFF" opacity="0.7"/>
    <rect x="2" y="44" width="46" height="4" fill="#D4B870"/>
    <line x1="7" y1="${y1+9}" x2="22" y2="${y1+9}" stroke="#D4C070" stroke-width="1.5"/>

    <line x1="9" y1="${y1+15}" x2="21" y2="${y1+15}" stroke="#D4C070" stroke-width="1.5"/>
    <line x1="25" y1="${y1+15}" x2="41" y2="${y1+15}" stroke="#D4C070" stroke-width="1.5"/>`;
}

const SUSHI_POST_PON = [
    { name: 'tuna'   },
    { name: 'salmon' },
    { name: 'shrimp' },

    { name: 'roe'    },

const COLS = 6, ROWS = 10;
let board = [], current = null, next = null;
let col = 0, row = 0, score = 0, level = 1;
let timer = null, running = false;

function getSpeed() {
    return Math.max(130, 700 - (level - 1) * 80);
}

function updateLevel() {
    const newLevel = Math.min(10, Math.floor(score / 100) + 1);
    if (newLevel > level) {
        level = newLevel;
        document.getElementById('level').textContent = level;
        showLevelUp();
        clearInterval(timer);
        timer = setInterval(moveDown, getSpeed());
    }
}

function showLevelUp() {
    document.getElementById('levelup-body').textContent = `LEVEL  ${level}`;
    const msg = document.getElementById('levelup-msg');
    msg.classList.remove('show');
    void msg.offsetWidth;
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 1400);
}

function initBoard() {
    board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
}

function randomSushi() {
    const base = (ponPlayed && !potatoMinigamePlayed) ? SUSHI_POST_PON : SUSHI;
    const pool = base.filter(s =>
        !(s.name === 'potato' && potatoMinigamePlayed) &&
        !(s.name === 'potato' && !ponPlayed) &&
        !(s.name === 'pon'    && ponPlayed) &&
        !(s.name === 'pon'    && matchClearCount < 2)
    );
    return pool[Math.floor(Math.random() * pool.length)];
}

function render() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const piece = (r === row && c === col && current) ? current : board[r][c];
            if (piece) {
                const svgName = (glitchBlink && piece.name !== 'pon') ? 'pon' : piece.name;
                cell.innerHTML = SUSHI_SVG[svgName];
                if (piece.matched) cell.classList.add('matched');
            }
            el.appendChild(cell);
        }
    }
}

function spawnPiece() {
    current = next || randomSushi();
    next = randomSushi();
    col = Math.floor(COLS / 2);
    row = 0;
    document.getElementById('next-piece').innerHTML = SUSHI_SVG[next.name];
    if (board[row][col]) { gameOver(); return; }
}

function moveDown() {
    if (row + 1 < ROWS && !board[row + 1][col]) {
        row++;
    } else {
        board[row][col] = current;
        checkMatches();
        spawnPiece();
    }
    render();
}

function moveLeft()  { if (col > 0 && !board[row][col-1]) { col--; render(); } }
function moveRight() { if (col < COLS-1 && !board[row][col+1]) { col++; render(); } }

function checkMatches() {
    const matched = new Set();
    const visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!board[r][c] || board[r][c].matched || visited[r][c]) continue;
            const type = board[r][c].name;
            const group = [];
            const queue = [[r, c]];
            visited[r][c] = true;
            while (queue.length > 0) {
                const [cr, cc] = queue.shift();
                group.push(`${cr},${cc}`);
                for (const [nr, nc] of [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]]) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
                        !visited[nr][nc] && board[nr][nc] &&
                        board[nr][nc].name === type && !board[nr][nc].matched) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            if (group.length >= 3) group.forEach(k => matched.add(k));
        }
    }

    if (matched.size === 0) return;

    // ポテト・ポンマッチ検出（消す前に確認）
    const hasPotatoMatch = [...matched].some(key => {
        const [r, c] = key.split(',').map(Number);
        return board[r][c] && board[r][c].name === 'potato';
    });
    const hasPonMatch = [...matched].some(key => {
        const [r, c] = key.split(',').map(Number);
        return board[r][c] && board[r][c].name === 'pon';
    });

    // フラグを即時設定（spawnPieceがrandomSushiを呼ぶ前に反映させるため）
    if (hasPotatoMatch && !potatoMinigamePlayed) potatoMinigamePlayed = true;
    if (hasPonMatch    && !ponPlayed)            ponPlayed = true;

    matched.forEach(key => {
        const [r, c] = key.split(',').map(Number);
        board[r][c] = { ...board[r][c], matched: true };
    });
    render();

    setTimeout(() => {
        matched.forEach(key => {
            const [r, c] = key.split(',').map(Number);
            board[r][c] = null;
        });
        score += matched.size * 10;
        document.getElementById('score').textContent = score;
        updateLevel();
        applyGravity();
        if (!hasPotatoMatch && !hasPonMatch) matchClearCount++;
        if (hasPotatoMatch) {
            startMinigame();
        } else if (hasPonMatch) {
            startPonNovel();
        } else {
            setTimeout(checkMatches, 150);
        }
    }, 450);
}

function startMinigame() {
    running = false;
    clearInterval(timer);
    harvestedCount = 0;
    for (let i = 0; i < 3; i++) {
        document.getElementById(`plant-${i}`).classList.remove('harvested');
        document.getElementById(`dot-${i}`).classList.remove('filled');
    }
    document.getElementById('mg-field').classList.remove('mg-hidden');
    document.getElementById('mg-furnace').classList.add('mg-hidden');
    document.getElementById('mg-complete').classList.add('mg-hidden');
    document.getElementById('minigame-overlay').classList.remove('mg-hidden');
}

function harvestPlant(i) {
    const plant = document.getElementById(`plant-${i}`);
    if (plant.classList.contains('harvested')) return;
    plant.classList.add('harvested');
    document.getElementById(`dot-${harvestedCount}`).classList.add('filled');
    harvestedCount++;
    if (harvestedCount >= 3) {
        setTimeout(() => {
            document.getElementById('mg-field').classList.add('mg-hidden');
            document.getElementById('mg-furnace').classList.remove('mg-hidden');
            document.getElementById('furnace-output').innerHTML = '';
            document.getElementById('furnace-svg-idle').style.display = 'block';

            const btn = document.getElementById('cook-btn');
            btn.disabled = false;
            btn.textContent = '焼く';
        }, 500);
    }
}

    { name: 'しろいポン',  msg: '…寿司、食べたい。' },
    { name: 'しろいポン',  msg: '（また寿司か、と\n思わないでほしい。）' },
    { name: 'しろいポン',  msg: 'いつもの道。\nいつもの夜。' },
    { name: 'しろいポン',  msg: 'まあ、悪くない。' },
];
let ponSceneIdx = 0;

function startPonNovel() {
    running = false;
    clearInterval(timer);
    ponSceneIdx = 0;
    document.getElementById('pon-overlay').classList.remove('pon-hidden');
    showPonScene();
}

function showPonScene() {
    const scene = PON_SCENES[ponSceneIdx];
    document.getElementById('pon-name-tag').textContent = scene.name;
    const msgEl = document.getElementById('pon-msg');
    const cursor = document.getElementById('pon-cursor');
    cursor.classList.add('hidden');
    msgEl.textContent = '';
    // タイプライター風テキスト表示
    let i = 0;
    const text = scene.msg;
    const typing = setInterval(() => {
        msgEl.textContent = text.slice(0, i + 1);
        i++;
        if (i >= text.length) {
            clearInterval(typing);
            cursor.classList.remove('hidden');
        }
    }, 80);
}

function ponNext() {
    ponSceneIdx++;
    if (ponSceneIdx >= PON_SCENES.length) {
        // ノベル終了 → フェードアウト → グリッチへ
        const overlay = document.getElementById('pon-overlay');
        overlay.style.transition = 'opacity 0.8s ease';
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.opacity = '';
            overlay.style.transition = '';
            overlay.classList.add('pon-hidden');
            startGlitch();
        }, 800);
    } else {
        showPonScene();
    }
}

// ── グリッチシーケンス ────────────────────────────────────────────
const TERM_LINES = [
    { text: '> SYSTEM ERROR DETECTED',          cls: 't-error' },
    { text: '> unauthorized entity : PON',      cls: 't-warn'  },
    { text: '> scanning memory...',             cls: ''        },
    { text: '> threat level : CRITICAL',        cls: 't-error' },
    { text: '> initiating memory purge...',     cls: ''        },
    { text: '> ████████████████ 100%',          cls: ''        },
    { text: '> purge complete.',                cls: ''        },
    { text: '> ポンは存在しません',              cls: 't-white' },
    { text: '> resuming normal operation...',   cls: ''        },
];

function startGlitch() {
    const g = document.getElementById('glitch-overlay');
    g.classList.remove('glitch-hidden');
    document.getElementById('glitch-dialog').style.display = '';
    document.getElementById('glitch-terminal').classList.add('glitch-hidden');
}

function glitchOK() {
    document.getElementById('glitch-dialog').style.display = 'none';
    const term = document.getElementById('glitch-terminal');
    term.classList.remove('glitch-hidden');
    const lines = document.getElementById('glitch-term-lines');
    lines.innerHTML = '';
    let i = 0;
    const delays = [0, 500, 900, 1300, 1800, 2200, 3000, 3500, 4200];
    TERM_LINES.forEach((line, idx) => {
        setTimeout(() => {
            const el = document.createElement('div');
            el.textContent = line.text;
            if (line.cls) el.classList.add(line.cls);
            lines.appendChild(el);
        }, delays[idx] || idx * 450);
    });
    setTimeout(endGlitch, 5800);
}

function startGameGlitch() {
    const container = document.querySelector('.game-container');
    container.classList.add('glitch-active');
    let elapsed = 0;
    const blinkInterval = setInterval(() => {
        glitchBlink = !glitchBlink;
        render();
        elapsed += 120;
        if (elapsed >= 8000) {
            clearInterval(blinkInterval);
            glitchBlink = false;
            render();
            container.classList.remove('glitch-active');
        }
    }, 120);
}

function endGlitch() {
    const g = document.getElementById('glitch-overlay');
    g.style.transition = 'opacity 0.8s ease';
    g.style.opacity = '0';
    setTimeout(() => {
        g.style.opacity = '';
        g.style.transition = '';
        g.classList.add('glitch-hidden');
        score += 30;
        document.getElementById('score').textContent = score;
        updateLevel();
        running = true;
        timer = setInterval(moveDown, getSpeed());
        setTimeout(checkMatches, 150);
        startGameGlitch();
    }, 800);
}

// ポン画面タップで次へ
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pon-screen').addEventListener('click', () => {
        if (!document.getElementById('pon-overlay').classList.contains('pon-hidden')) {
            ponNext();
        }
    });
});

function endMinigame() {
    document.getElementById('minigame-overlay').classList.add('mg-hidden');
    score += 50;
    document.getElementById('score').textContent = score;
    updateLevel();
    running = true;
    timer = setInterval(moveDown, getSpeed());
    setTimeout(checkMatches, 150);
}

function applyGravity() {
    for (let c = 0; c < COLS; c++) {
        let empty = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
            if (board[r][c]) {
                board[empty][c] = board[r][c];
                if (empty !== r) board[r][c] = null;
                empty--;
            }
        }
    }
    render();
}

function gameOver() {
    if (!running) return;
    clearInterval(timer);
    running = false;
    document.getElementById('gameover-body').textContent = `SCORE  ${score}`;
    const msg = document.getElementById('gameover-msg');
    msg.classList.add('show');
    setTimeout(() => {
        msg.classList.remove('show');
        document.getElementById('start-btn').textContent = 'もう一度';
        document.getElementById('start-overlay').classList.remove('hidden');
    }, 1600);
}

function startGame() {
    document.getElementById('start-overlay').classList.add('hidden');
    initBoard();
    score = 0; level = 1; potatoMinigamePlayed = false; ponPlayed = false; matchClearCount = 0;
    document.getElementById('score').textContent = '0';
    document.getElementById('level').textContent = '1';
    next = randomSushi();
    spawnPiece();
    render();
    clearInterval(timer);
    timer = setInterval(moveDown, getSpeed());
    running = true;
}

// キーボード操作
document.addEventListener('keydown', e => {
    if (!running) return;
    if (e.key === 'ArrowLeft')  moveLeft();
    if (e.key === 'ArrowRight') moveRight();
    if (e.key === 'ArrowDown')  moveDown();
});

// タッチボタン操作
// 長押し対応ボタン
function setupBtn(id, action) {
    const btn = document.getElementById(id);
    let iv = null;
    const start = (e) => {
        e.preventDefault();
        if (!running) return;
        action();
        iv = setInterval(() => { if (running) action(); }, 120);
    };
    const stop = () => { clearInterval(iv); iv = null; };
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('touchend',   stop);
    btn.addEventListener('touchcancel', stop);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup',   stop);
    btn.addEventListener('mouseleave', stop);
}
setupBtn('btn-left',  moveLeft);
setupBtn('btn-right', moveRight);
setupBtn('btn-down',  moveDown);

// スワイプ操作
let touchStartX = 0, touchStartY = 0;
document.getElementById('board').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
}, { passive: false });

document.getElementById('board').addEventListener('touchend', e => {
    if (!running) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20) moveRight();
        else if (dx < -20) moveLeft();
    } else {
        if (dy > 20) moveDown();
    }
    e.preventDefault();
}, { passive: false });

document.getElementById('start-btn').addEventListener('click', startGame);

initBoard();
render();
</script>
