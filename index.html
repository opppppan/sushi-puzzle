<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍣 寿司パズル</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #FFF8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .game-board {
            border: 3px solid #B0BEC5;
            border-radius: 8px;
            overflow: hidden;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            grid-template-rows: repeat(10, 50px);
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid rgba(0,0,0,0.06);
            background: #F0EDE8;
            overflow: hidden;
        }

        .cell svg { display: block; width: 100%; height: 100%; }

        @keyframes sushiPop {
            0%   { transform: scale(1);    opacity: 1;   filter: brightness(1); }
            25%  { transform: scale(1.2);  opacity: 1;   filter: brightness(2); }
            65%  { transform: scale(0.85); opacity: 0.5; filter: brightness(1.4); }
            100% { transform: scale(0);    opacity: 0; }
        }

        .cell.matched {
            animation: sushiPop 0.45s ease forwards;
            overflow: visible;
            z-index: 10;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 120px;
        }

        .box {
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .box h3 { font-size: 13px; color: #888; margin-bottom: 8px; }

        .score { font-size: 32px; font-weight: bold; color: #333; }

        .next-piece {
            width: 50px;
            height: 50px;
            margin: 0 auto;
            overflow: hidden;
        }
        .next-piece svg { display: block; width: 100%; height: 100%; }

        .btn {
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: #FF5252; }

        .controls {
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
        .controls h3 { font-size: 13px; color: #888; margin-bottom: 6px; }

        @keyframes levelUpAnim {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        #levelup-msg {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #FFD740;
            color: #333;
            font-size: 28px;
            font-weight: bold;
            padding: 16px 32px;
            border-radius: 12px;
            border: 3px solid #B0BEC5;
            pointer-events: none;
            z-index: 100;
        }
        #levelup-msg.show {
            display: block;
            animation: levelUpAnim 1s ease forwards;
        }

        /* タッチボタン（スマホのみ表示） */
        .touch-controls {
            display: none;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
        }
        .touch-btn {
            width: 72px;
            height: 72px;
            font-size: 26px;
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background 0.1s, transform 0.1s;
        }
        .touch-btn:active {
            background: #FFE4E4;
            transform: scale(0.92);
        }

        /* ── ミニゲーム ── */
        #minigame-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, #B3E5FC 0%, #E8F5E9 60%, #FFF8F0 100%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #minigame-overlay.mg-hidden { display: none; }

        .mg-card {
            background: #FFF;
            border: 3px solid #B0BEC5;
            border-radius: 20px;
            padding: 28px 32px;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .mg-screen { display: contents; }
        .mg-screen.mg-hidden { display: none; }

        .mg-title {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            letter-spacing: 0.05em;
        }

        /* 畑 */
        .mg-field-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            background: #C8E6C9;
            padding: 16px 12px 8px;
            border-radius: 16px 16px 0 0;
            border: 2px solid #B0BEC5;
        }
        .mg-dirt-row {
            width: 100%;
            height: 20px;
            background: #D7CCC8;
            border: 2px solid #B0BEC5;
            border-top: none;
            border-radius: 0 0 16px 16px;
        }
        .potato-plant {
            cursor: pointer;
            transition: transform 0.15s;
            text-align: center;
            touch-action: manipulation;
        }
        .potato-plant:active { transform: scale(0.8); }
        @keyframes harvestPop {
            0%   { transform: scale(1); opacity: 1; }
            50%  { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(0); opacity: 0; }
        }
        .potato-plant.harvested { animation: harvestPop 0.3s ease forwards; }

        .mg-dots {
            display: flex;
            gap: 10px;
        }
        .mg-dot {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #E0E0E0;
            border: 2px solid #B0BEC5;
            transition: background 0.3s;
        }
        .mg-dot.filled { background: #A5D6A7; border-color: #81C784; }

        /* かまど */
        .mg-furnace-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .mg-slot {
            width: 64px; height: 64px;
            background: #F5F5F5;
            border: 2px solid #B0BEC5;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px;
        }
        .mg-furnace-block {
            width: 72px; height: 72px;
            background: #ECEFF1;
            border: 2px solid #B0BEC5;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }
        @keyframes furnaceGlow {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.75; }
        }
        #furnace-svg-active { animation: furnaceGlow 0.45s ease-in-out infinite; display: none; }
        #furnace-svg-idle   { display: block; }
        .mg-arrow { font-size: 18px; color: #B0BEC5; }

        /* ボタン */
        .mg-btn {
            background: #FF6B6B;
            color: #FFF;
            border: none;
            border-radius: 12px;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            width: 100%;
        }
        .mg-btn:active { background: #FF5252; }
        .mg-btn:disabled { background: #BDBDBD; }

        .mg-bonus {
            font-size: 30px;
            font-weight: bold;
            color: #FFB300;
        }

        /* ── リミナルブレイク ── */
        #liminal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #d8dce0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
        }
        #liminal-overlay.lm-hidden { display: none; }

        #liminal-scene {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: calc(100vh - 98px);
            cursor: default;
            overflow: hidden;
        }

        #lm-photo {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            filter: contrast(1.4) saturate(1.3) brightness(0.92);
        }

        .lm-area {
            position: absolute;
            cursor: pointer;
            border-radius: 4px;
            transition: opacity 0.15s;
        }
        .lm-area:active { opacity: 0.7; }

        /* DQ風テキストボックス */
        #lm-textbox {
            width: 100%;
            max-width: 480px;
            min-height: 90px;
            background: #111;
            border-top: 4px solid #aabbcc;
            border-bottom: 4px solid #aabbcc;
            box-shadow: inset 0 0 0 3px #111, inset 0 0 0 6px #aabbcc;
            padding: 14px 20px 14px 20px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            color: #e8f0f8;
            line-height: 1.7;
            letter-spacing: 0.04em;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        #lm-textbox.lm-hidden { display: none; }
        #lm-cursor {
            display: inline-block;
            width: 10px; height: 10px;
            background: #e8e8e8;
            animation: lmBlink 0.7s step-end infinite;
            margin-top: 3px;
            flex-shrink: 0;
        }
        @keyframes lmBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #lm-textbox-msg { flex: 1; }

        @keyframes lmFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        #liminal-overlay { animation: lmFadeIn 1.2s ease; }

        /* スタートオーバーレイ */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
        }
        #start-overlay.hidden { display: none; }
        .start-overlay-btn {
            pointer-events: all;
            font-size: 22px;
            padding: 18px 48px;
            border-radius: 16px;
            background: #FF6B6B;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .start-overlay-btn:hover { background: #FF5252; }

        /* モバイルレイアウト */
        @media (max-width: 900px) {
            body { align-items: flex-start; padding: 12px 0; }
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            .side-panel { order: -1; }
            .board-grid {
                grid-template-columns: repeat(6, 44px);
                grid-template-rows: repeat(10, 44px);
            }
            .cell { width: 44px; height: 44px; }
            .next-piece { width: 44px; height: 44px; }
            .side-panel {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                min-width: unset;
                width: 100%;
                max-width: 280px;
                gap: 8px;
            }
            .box { flex: 1; min-width: 70px; padding: 8px; }
            .score { font-size: 20px; }
            .btn { padding: 10px 20px; width: auto; }
            .controls { display: none; }
            .touch-controls { display: flex; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div>
        <div class="game-board">
            <div class="board-grid" id="board"></div>
        </div>
        <div class="touch-controls">
            <button class="touch-btn" id="btn-left">◀</button>
            <button class="touch-btn" id="btn-down">▼</button>
            <button class="touch-btn" id="btn-right">▶</button>
        </div>
    </div>
    <div class="side-panel">
        <div class="box">
            <h3>レベル</h3>
            <div class="score" id="level">1</div>
        </div>
        <div class="box">
            <h3>スコア</h3>
            <div class="score" id="score">0</div>
        </div>
        <div class="box">
            <h3>次のピース</h3>
            <div class="next-piece" id="next-piece"></div>
        </div>
        <div class="controls">
            <h3>操作方法</h3>
            ← → 移動<br>
            ↓ 落とす
        </div>
    </div>
</div>

<div id="minigame-overlay" class="mg-hidden">

    <!-- 畑画面 -->
    <div id="mg-field" class="mg-screen">
        <div class="mg-card">
            <div class="mg-title">ポテトを収穫しよう</div>
            <div class="mg-field-row">
                <div class="potato-plant" id="plant-0" onclick="harvestPlant(0)">
                    <svg viewBox="0 0 50 72" width="66" height="88">
                        <ellipse cx="25" cy="22" rx="10" ry="18" fill="#C8E6C9" transform="rotate(-22 25 22)"/>
                        <ellipse cx="25" cy="22" rx="10" ry="18" fill="#A5D6A7" transform="rotate(22 25 22)"/>
                        <ellipse cx="25" cy="12" rx="7"  ry="13" fill="#81C784"/>
                        <rect    x="22"  y="28" width="6" height="14" rx="3" fill="#A5D6A7"/>
                        <ellipse cx="25" cy="52" rx="17" ry="12" fill="#FFCC80"/>
                        <ellipse cx="25" cy="50" rx="13" ry="9"  fill="#FFD54F"/>
                        <circle cx="18" cy="52" r="2"   fill="#FFB300" opacity="0.5"/>
                        <circle cx="29" cy="54" r="2.5" fill="#FFB300" opacity="0.5"/>
                        <circle cx="33" cy="49" r="1.5" fill="#FFB300" opacity="0.5"/>
                    </svg>
                </div>
                <div class="potato-plant" id="plant-1" onclick="harvestPlant(1)">
                    <svg viewBox="0 0 50 72" width="66" height="88">
                        <ellipse cx="25" cy="22" rx="10" ry="18" fill="#C8E6C9" transform="rotate(-22 25 22)"/>
                        <ellipse cx="25" cy="22" rx="10" ry="18" fill="#A5D6A7" transform="rotate(22 25 22)"/>
                        <ellipse cx="25" cy="12" rx="7"  ry="13" fill="#81C784"/>
                        <rect    x="22"  y="28" width="6" height="14" rx="3" fill="#A5D6A7"/>
                        <ellipse cx="25" cy="52" rx="17" ry="12" fill="#FFCC80"/>
                        <ellipse cx="25" cy="50" rx="13" ry="9"  fill="#FFD54F"/>
                        <circle cx="18" cy="52" r="2"   fill="#FFB300" opacity="0.5"/>
                        <circle cx="29" cy="54" r="2.5" fill="#FFB300" opacity="0.5"/>
                        <circle cx="33" cy="49" r="1.5" fill="#FFB300" opacity="0.5"/>
                    </svg>
                </div>
                <div class="potato-plant" id="plant-2" onclick="harvestPlant(2)">
                    <svg viewBox="0 0 50 72" width="66" height="88">
                        <ellipse cx="25" cy="22" rx="10" ry="18" fill="#C8E6C9" transform="rotate(-22 25 22)"/>
                        <ellipse cx="25" cy="22" rx="10" ry="18" fill="#A5D6A7" transform="rotate(22 25 22)"/>
                        <ellipse cx="25" cy="12" rx="7"  ry="13" fill="#81C784"/>
                        <rect    x="22"  y="28" width="6" height="14" rx="3" fill="#A5D6A7"/>
                        <ellipse cx="25" cy="52" rx="17" ry="12" fill="#FFCC80"/>
                        <ellipse cx="25" cy="50" rx="13" ry="9"  fill="#FFD54F"/>
                        <circle cx="18" cy="52" r="2"   fill="#FFB300" opacity="0.5"/>
                        <circle cx="29" cy="54" r="2.5" fill="#FFB300" opacity="0.5"/>
                        <circle cx="33" cy="49" r="1.5" fill="#FFB300" opacity="0.5"/>
                    </svg>
                </div>
            </div>
            <div class="mg-dirt-row"></div>
            <div class="mg-dots">
                <div class="mg-dot" id="dot-0"></div>
                <div class="mg-dot" id="dot-1"></div>
                <div class="mg-dot" id="dot-2"></div>
            </div>
        </div>
    </div>

    <!-- かまど画面 -->
    <div id="mg-furnace" class="mg-screen mg-hidden">
        <div class="mg-card">
            <div class="mg-title">かまどで焼こう</div>
            <div class="mg-furnace-row">

                <!-- 生ポテト -->
                <div class="mg-slot" id="furnace-input">
                    <svg viewBox="0 0 64 46" width="58" height="42">
                        <ellipse cx="32" cy="23" rx="30" ry="20" fill="#B08010"/>
                        <ellipse cx="32" cy="23" rx="28" ry="18" fill="#E8C030"/>
                        <ellipse cx="24" cy="17" rx="15" ry="10" fill="#F0D060" opacity="0.75"/>
                        <ellipse cx="21" cy="15" rx="8"  ry="5"  fill="#F8E080" opacity="0.65"/>
                        <circle cx="40" cy="18" r="2.5" fill="#A07010" opacity="0.55"/>
                        <circle cx="26" cy="30" r="2"   fill="#A07010" opacity="0.45"/>
                        <circle cx="44" cy="28" r="2"   fill="#9A6A10" opacity="0.45"/>
                        <circle cx="36" cy="32" r="1.5" fill="#A07010" opacity="0.4"/>
                    </svg>
                </div>

                <div class="mg-arrow">›</div>

                <!-- かまどブロック -->
                <div class="mg-furnace-block" style="background:none; border:none; width:72px; height:72px; position:relative;">

                    <!-- 通常時（正面かまど） -->
                    <svg id="furnace-svg-idle" viewBox="0 0 60 60" width="72" height="72" style="position:absolute;top:0;left:0;">
                        <rect x="0" y="0" width="60" height="60" fill="#8C8C8C"/>
                        <!-- 石テクスチャパッチ -->
                        <rect x="1"  y="1"  width="19" height="13" fill="#9C9C9C"/>
                        <rect x="22" y="1"  width="16" height="13" fill="#848484"/>
                        <rect x="40" y="1"  width="19" height="13" fill="#9C9C9C"/>
                        <rect x="1"  y="46" width="19" height="13" fill="#848484"/>
                        <rect x="22" y="46" width="16" height="13" fill="#9C9C9C"/>
                        <rect x="40" y="46" width="19" height="13" fill="#848484"/>
                        <rect x="1"  y="16" width="10" height="26" fill="#848484"/>
                        <rect x="49" y="16" width="10" height="26" fill="#9C9C9C"/>
                        <!-- 上スロット（素材入れ） -->
                        <rect x="12" y="8"  width="36" height="16" fill="#404040"/>
                        <rect x="14" y="10" width="32" height="12" fill="#262626"/>
                        <!-- 下スロット（火口） -->
                        <rect x="12" y="30" width="36" height="22" fill="#404040"/>
                        <rect x="14" y="32" width="32" height="18" fill="#1A1A1A"/>
                        <rect x="0" y="0" width="60" height="60" fill="none" stroke="#B0BEC5" stroke-width="2"/>
                    </svg>

                    <!-- 燃焼中（正面かまど・火あり） -->
                    <svg id="furnace-svg-active" viewBox="0 0 60 60" width="72" height="72" style="position:absolute;top:0;left:0;">
                        <rect x="0" y="0" width="60" height="60" fill="#8C8C8C"/>
                        <rect x="1"  y="1"  width="19" height="13" fill="#9C9C9C"/>
                        <rect x="22" y="1"  width="16" height="13" fill="#848484"/>
                        <rect x="40" y="1"  width="19" height="13" fill="#9C9C9C"/>
                        <rect x="1"  y="46" width="19" height="13" fill="#848484"/>
                        <rect x="22" y="46" width="16" height="13" fill="#9C9C9C"/>
                        <rect x="40" y="46" width="19" height="13" fill="#848484"/>
                        <rect x="1"  y="16" width="10" height="26" fill="#848484"/>
                        <rect x="49" y="16" width="10" height="26" fill="#9C9C9C"/>
                        <!-- 上スロット -->
                        <rect x="12" y="8"  width="36" height="16" fill="#404040"/>
                        <rect x="14" y="10" width="32" height="12" fill="#262626"/>
                        <!-- 下スロット（燃焼中・オレンジ） -->
                        <rect x="12" y="30" width="36" height="22" fill="#E05A00"/>
                        <rect x="14" y="32" width="32" height="18" fill="#FF6D00"/>
                        <!-- 炎 -->
                        <rect x="18" y="25" width="8"  height="12" fill="#FFAB40" rx="1"/>
                        <rect x="34" y="27" width="8"  height="10" fill="#FFD740" rx="1"/>
                        <rect x="26" y="22" width="8"  height="14" fill="#FFCC02" rx="1"/>
                        <!-- 光彩 -->
                        <rect x="0" y="0" width="60" height="60" fill="#FF8C00" opacity="0.1"/>
                        <rect x="0" y="0" width="60" height="60" fill="none" stroke="#B0BEC5" stroke-width="2"/>
                    </svg>
                </div>

                <div class="mg-arrow">›</div>

                <!-- 出力スロット -->
                <div class="mg-slot" id="furnace-output"></div>
            </div>
            <button class="mg-btn" id="cook-btn" onclick="cookPotato()">焼く</button>
        </div>
    </div>

    <!-- 完成画面 -->
    <div id="mg-complete" class="mg-screen mg-hidden">
        <div class="mg-card">
            <div class="mg-title">ベイクドポテト完成！</div>
            <svg viewBox="0 0 60 56" width="96" height="90" style="margin: 8px 0;">
                <ellipse cx="30" cy="28" rx="28" ry="25" fill="#8A4E08"/>
                <ellipse cx="30" cy="28" rx="26" ry="23" fill="#C07818"/>
                <ellipse cx="30" cy="28" rx="18" ry="15" fill="#D49420"/>
                <ellipse cx="26" cy="24" rx="11" ry="8"  fill="#E8C030" opacity="0.85"/>
                <ellipse cx="32" cy="30" rx="8"  ry="6"  fill="#D4A820" opacity="0.7"/>
                <ellipse cx="24" cy="22" rx="6"  ry="4"  fill="#F0D450" opacity="0.75"/>
                <ellipse cx="36" cy="34" rx="7"  ry="5"  fill="#904010" opacity="0.35"/>
            </svg>
            <div class="mg-bonus">+ 50 pts</div>
            <button class="mg-btn" onclick="endMinigame()">ゲームに戻る</button>
        </div>
    </div>

</div>

// ── ゲームロジック ────────────────────────────────────────────────
const SUSHI = [
    { name: 'tuna'   },
    { name: 'salmon' },
    { name: 'shrimp' },
    { name: 'egg'    },
    { name: 'roe'    },
    { name: 'potato' },
    { name: 'potato' },
    { name: 'potato' },
    { name: 'pool'   },
    { name: 'pool'   },
    { name: 'pool'   },
    { name: 'pool'   },
    { name: 'pool'   },
];

const COLS = 6, ROWS = 10;
let board = [], current = null, next = null;
let col = 0, row = 0, score = 0, level = 1;
let timer = null, running = false;

function getSpeed() {
    return Math.max(130, 700 - (level - 1) * 80);
}

function updateLevel() {
    const newLevel = Math.min(10, Math.floor(score / 100) + 1);
    if (newLevel > level) {
        level = newLevel;
        document.getElementById('level').textContent = level;
        showLevelUp();
        clearInterval(timer);
        timer = setInterval(moveDown, getSpeed());
    }
}

function showLevelUp() {
    const msg = document.getElementById('levelup-msg');
    msg.classList.remove('show');
    void msg.offsetWidth; // リフロー強制
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 1000);
}

function initBoard() {
    board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
}

function randomSushi() {
    const pool = SUSHI.filter(s =>
        !(s.name === 'pool'   && liminalPlayed) &&
        !(s.name === 'potato' && potatoMinigamePlayed)
    );
    return pool[Math.floor(Math.random() * pool.length)];
}

function render() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const piece = (r === row && c === col && current) ? current : board[r][c];
            if (piece) {
                cell.innerHTML = SUSHI_SVG[piece.name];
                if (piece.matched) cell.classList.add('matched');
            }
            el.appendChild(cell);
        }
    }
}

function spawnPiece() {
    current = next || randomSushi();
    next = randomSushi();
    col = Math.floor(COLS / 2);
    row = 0;
    document.getElementById('next-piece').innerHTML = SUSHI_SVG[next.name];
    if (board[row][col]) { gameOver(); return; }
}

function moveDown() {
    if (row + 1 < ROWS && !board[row + 1][col]) {
        row++;
    } else {
        board[row][col] = current;
        checkMatches();
        spawnPiece();
    }
    render();
}

function moveLeft()  { if (col > 0 && !board[row][col-1]) { col--; render(); } }
function moveRight() { if (col < COLS-1 && !board[row][col+1]) { col++; render(); } }

function checkMatches() {
    const matched = new Set();
    const visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!board[r][c] || board[r][c].matched || visited[r][c]) continue;
            const type = board[r][c].name;
            const group = [];
            const queue = [[r, c]];
            visited[r][c] = true;
            while (queue.length > 0) {
                const [cr, cc] = queue.shift();
                group.push(`${cr},${cc}`);
                for (const [nr, nc] of [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]]) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
                        !visited[nr][nc] && board[nr][nc] &&
                        board[nr][nc].name === type && !board[nr][nc].matched) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            if (group.length >= 3) group.forEach(k => matched.add(k));
        }
    }

    if (matched.size === 0) return;

    // ポテト・プールマッチ検出（消す前に確認）
    const hasPotatoMatch = [...matched].some(key => {
        const [r, c] = key.split(',').map(Number);
        return board[r][c] && board[r][c].name === 'potato';
    });
    const hasPoolMatch = [...matched].some(key => {
        const [r, c] = key.split(',').map(Number);
        return board[r][c] && board[r][c].name === 'pool';
    });

    // フラグを即時設定（spawnPieceがrandomSushiを呼ぶ前に反映させるため）
    if (hasPotatoMatch && !potatoMinigamePlayed) potatoMinigamePlayed = true;
    if (hasPoolMatch   && !liminalPlayed)        liminalPlayed = true;

    matched.forEach(key => {
        const [r, c] = key.split(',').map(Number);
        board[r][c] = { ...board[r][c], matched: true };
    });
    render();

    setTimeout(() => {
        matched.forEach(key => {
            const [r, c] = key.split(',').map(Number);
            board[r][c] = null;
        });
        score += matched.size * 10;
        document.getElementById('score').textContent = score;
        updateLevel();
        applyGravity();
        if (hasPotatoMatch) {
            startMinigame();
        } else if (hasPoolMatch) {
            startLiminal();
        } else {
            setTimeout(checkMatches, 150);
        }
    }, 450);
}

// ── ミニゲーム ────────────────────────────────────────────────────
let harvestedCount = 0;
let potatoMinigamePlayed = false;
let liminalPlayed = false;

function startMinigame() {
    running = false;
    clearInterval(timer);
    harvestedCount = 0;
    for (let i = 0; i < 3; i++) {
        document.getElementById(`plant-${i}`).classList.remove('harvested');
        document.getElementById(`dot-${i}`).classList.remove('filled');
    }
    document.getElementById('mg-field').classList.remove('mg-hidden');
    document.getElementById('mg-furnace').classList.add('mg-hidden');
    document.getElementById('mg-complete').classList.add('mg-hidden');
    document.getElementById('minigame-overlay').classList.remove('mg-hidden');
}

function harvestPlant(i) {
    const plant = document.getElementById(`plant-${i}`);
    if (plant.classList.contains('harvested')) return;
    plant.classList.add('harvested');
    document.getElementById(`dot-${harvestedCount}`).classList.add('filled');
    harvestedCount++;
    if (harvestedCount >= 3) {
        setTimeout(() => {
            document.getElementById('mg-field').classList.add('mg-hidden');
            document.getElementById('mg-furnace').classList.remove('mg-hidden');
            document.getElementById('furnace-output').innerHTML = '';
            document.getElementById('furnace-svg-idle').style.display = 'block';
            document.getElementById('furnace-svg-active').style.display = 'none';
            const btn = document.getElementById('cook-btn');
            btn.disabled = false;
            btn.textContent = '焼く';
        }, 500);
    }
}

function cookPotato() {
    const btn = document.getElementById('cook-btn');
    btn.disabled = true;
    btn.textContent = '焼いています...';
    document.getElementById('furnace-input').innerHTML = '';
    // かまど点火
    document.getElementById('furnace-svg-idle').style.display   = 'none';
    document.getElementById('furnace-svg-active').style.display = 'block';
    setTimeout(() => {
        // 消火・完成
        document.getElementById('furnace-svg-active').style.display = 'none';
        document.getElementById('furnace-svg-idle').style.display   = 'block';
        document.getElementById('furnace-output').innerHTML = `
            <svg viewBox="0 0 60 56" width="48" height="45">
                <ellipse cx="30" cy="28" rx="28" ry="25" fill="#8A4E08"/>
                <ellipse cx="30" cy="28" rx="26" ry="23" fill="#C07818"/>
                <ellipse cx="30" cy="28" rx="18" ry="15" fill="#D49420"/>
                <ellipse cx="26" cy="24" rx="11" ry="8"  fill="#E8C030" opacity="0.85"/>
                <ellipse cx="32" cy="30" rx="8"  ry="6"  fill="#D4A820" opacity="0.7"/>
                <ellipse cx="24" cy="22" rx="6"  ry="4"  fill="#F0D450" opacity="0.75"/>
                <ellipse cx="36" cy="34" rx="7"  ry="5"  fill="#904010" opacity="0.35"/>
            </svg>`;
        setTimeout(() => {
            document.getElementById('mg-furnace').classList.add('mg-hidden');
            document.getElementById('mg-complete').classList.remove('mg-hidden');
        }, 600);
    }, 2500);
}

// ── リミナルブレイク ────────────────────────────────────────────
const LM_MESSAGES = {
    left: [
        'ピンクの光が漏れている。\n熱くも冷たくもない。',
        '壁に触れた。\n何も感じなかった。',
        'この光は、ずっと前から\nここにあったのかもしれない。',
    ],
    corridor: [
        '奥に、また部屋が続いている。\n誰もいない。',
        '歩いても歩いても\n同じ景色が続く気がした。',
        '何かの音がした。\n気のせいかもしれない。',
    ],
    right: [
        '黄緑の光。\n窓の外は、どこだろう。',
        '光の境界に立ってみた。\nどちらの世界でもない気がした。',
        '静かだ。\nずっとこのままなのかもしれない。',
    ],
};
const lmMsgIdx = { left: 0, corridor: 0, right: 0 };

function startLiminal() {
    running = false;
    clearInterval(timer);
    document.getElementById('liminal-overlay').classList.remove('lm-hidden');
    document.getElementById('lm-textbox').classList.add('lm-hidden');
}

function lmTap(area) {
    const msgs = LM_MESSAGES[area];
    if (!msgs) return;
    const idx = lmMsgIdx[area] % msgs.length;
    lmMsgIdx[area]++;
    const box = document.getElementById('lm-textbox');
    const msg = document.getElementById('lm-textbox-msg');
    msg.textContent = msgs[idx];
    box.classList.remove('lm-hidden');
}

function lmExit() {
    // ゆっくりフェードアウトして戻る
    const overlay = document.getElementById('liminal-overlay');
    overlay.style.transition = 'opacity 1.8s ease';
    overlay.style.opacity = '0';
    setTimeout(() => {
        overlay.style.opacity = '';
        overlay.style.transition = '';
        overlay.classList.add('lm-hidden');
        document.getElementById('lm-textbox').classList.add('lm-hidden');
        // インデックスリセット
        lmMsgIdx.shutter = 0; lmMsgIdx.bench = 0; lmMsgIdx.escalator = 0;
        running = true;
        timer = setInterval(moveDown, getSpeed());
        setTimeout(checkMatches, 150);
    }, 1800);
}

function endMinigame() {
    document.getElementById('minigame-overlay').classList.add('mg-hidden');
    score += 50;
    document.getElementById('score').textContent = score;
    updateLevel();
    running = true;
    timer = setInterval(moveDown, getSpeed());
    setTimeout(checkMatches, 150);
}

function applyGravity() {
    for (let c = 0; c < COLS; c++) {
        let empty = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
            if (board[r][c]) {
                board[empty][c] = board[r][c];
                if (empty !== r) board[r][c] = null;
                empty--;
            }
        }
    }
    render();
}

function gameOver() {
    clearInterval(timer);
    running = false;
    setTimeout(() => {
        alert(`ゲームオーバー！\nスコア: ${score}`);
        document.getElementById('start-btn').textContent = 'もう一度';
        document.getElementById('start-overlay').classList.remove('hidden');
    }, 100);
}

function startGame() {
    document.getElementById('start-overlay').classList.add('hidden');
    initBoard();
    score = 0; level = 1; potatoMinigamePlayed = false; liminalPlayed = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('level').textContent = '1';
    next = randomSushi();
    spawnPiece();
    render();
    clearInterval(timer);
    timer = setInterval(moveDown, getSpeed());
    running = true;
}

// キーボード操作
document.addEventListener('keydown', e => {
    if (!running) return;
    if (e.key === 'ArrowLeft')  moveLeft();
    if (e.key === 'ArrowRight') moveRight();
    if (e.key === 'ArrowDown')  moveDown();
});

// タッチボタン操作
// 長押し対応ボタン
function setupBtn(id, action) {
    const btn = document.getElementById(id);
    let iv = null;
    const start = (e) => {
        e.preventDefault();
        if (!running) return;
        action();
        iv = setInterval(() => { if (running) action(); }, 120);
    };
    const stop = () => { clearInterval(iv); iv = null; };
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('touchend',   stop);
    btn.addEventListener('touchcancel', stop);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup',   stop);
    btn.addEventListener('mouseleave', stop);
}
setupBtn('btn-left',  moveLeft);
setupBtn('btn-right', moveRight);
setupBtn('btn-down',  moveDown);

// スワイプ操作
let touchStartX = 0, touchStartY = 0;
document.getElementById('board').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
}, { passive: false });

document.getElementById('board').addEventListener('touchend', e => {
    if (!running) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20) moveRight();
        else if (dx < -20) moveLeft();
    } else {
        if (dy > 20) moveDown();
    }
    e.preventDefault();
}, { passive: false });

document.getElementById('start-btn').addEventListener('click', startGame);

initBoard();
render();
</script>
